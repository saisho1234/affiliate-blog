<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:800px; height:450px; background:linear-gradient(135deg,#7c2d12,#ea580c);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif; color:white; gap:16px; }
.label { background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5);
  border-radius:8px; padding:8px 20px; font-size:14px; letter-spacing:0.1em; }
.main { font-size:44px; font-weight:900; text-align:center; line-height:1.2; }
.sub { font-size:18px; opacity:0.85; text-align:center; }
.tools { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
.tool { background:rgba(255,255,255,0.15); border-radius:6px; padding:6px 12px; font-size:13px; }
</style></head><body>
<div class="label">AIライティングツール比較</div>
<div class="main">ブログ・SEO記事を<br>AI自動生成</div>
<div class="sub">10ツールを料金・日本語品質・機能で徹底比較</div>
<div class="tools">
  <span class="tool">Catchy</span><span class="tool">Claude</span>
  <span class="tool">ChatGPT</span><span class="tool">Value AI Writer</span>
</div>
</body></html>
