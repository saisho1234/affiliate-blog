<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:800px; height:450px; background:linear-gradient(135deg,#065f46,#059669);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif; color:white; gap:16px; }
.label { background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5);
  border-radius:8px; padding:8px 20px; font-size:14px; letter-spacing:0.1em; }
.main { font-size:44px; font-weight:900; text-align:center; line-height:1.2; }
.sub { font-size:18px; opacity:0.85; }
.stats { display:flex; gap:20px; margin-top:8px; }
.stat { text-align:center; }
.stat-n { font-size:36px; font-weight:900; }
.stat-l { font-size:13px; opacity:0.8; }
</style></head><body>
<div class="label">AI議事録ツール比較</div>
<div class="main">会議録を<br>完全自動化</div>
<div class="sub">文字起こし精度95%以上のAIツールを徹底比較</div>
<div class="stats">
  <div class="stat"><div class="stat-n">8</div><div class="stat-l">ツール比較</div></div>
  <div class="stat"><div class="stat-n">95%</div><div class="stat-l">日本語精度</div></div>
  <div class="stat"><div class="stat-n">無料</div><div class="stat-l">プランあり</div></div>
</div>
</body></html>
