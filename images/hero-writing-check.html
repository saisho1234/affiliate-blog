<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:800px; height:450px; background:linear-gradient(135deg,#4c1d95,#7c3aed);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif; color:white; gap:16px; }
.label { background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5);
  border-radius:8px; padding:8px 20px; font-size:14px; letter-spacing:0.1em; }
.main { font-size:44px; font-weight:900; text-align:center; line-height:1.2; }
.sub { font-size:18px; opacity:0.85; text-align:center; }
.features { display:flex; gap:12px; margin-top:8px; }
.feat { background:rgba(255,255,255,0.15); border-radius:6px; padding:6px 14px; font-size:14px; }
</style></head><body>
<div class="label">AI文章校正ツール比較</div>
<div class="main">誤字脱字を<br>AI自動チェック</div>
<div class="sub">文賢・Grammarly・ChatGPT校正を徹底比較</div>
<div class="features">
  <span class="feat">8ツール比較</span>
  <span class="feat">日本語対応</span>
  <span class="feat">無料あり</span>
</div>
</body></html>
