<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:800px; height:450px; background:linear-gradient(135deg,#1e40af,#3b82f6);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif; color:white; gap:20px; }
.label { background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5);

.main { font-size:52px; font-weight:900; text-align:center; line-height:1.2; }
.sub { font-size:18px; opacity:0.85; text-align:center; }
.features { display:flex; gap:12px; margin-top:8px; }
.feat { background:rgba(255,255,255,0.15); border-radius:6px; padding:6px 14px; font-size:14px; }
</style></head><body>
<div class="label">AIスライド作成ツール</div>
<div class="main">イルシル<br>徹底レビュー</div>
<div class="sub">日本語No.1 AIスライド作成ツール</div>
<div class="features">
  <span class="feat">無料トライアルあり</span>
  <span class="feat">PPT書き出し対応</span>
  <span class="feat">日本語最高品質</span>
</div>
</body></html>
