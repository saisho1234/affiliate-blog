<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1200px; height:630px; background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);
  display:flex; align-items:center; justify-content:center;
  font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif; overflow:hidden; position:relative; }
.g1 { position:absolute; width:400px; height:400px; border-radius:50%; top:-100px; left:-100px;
  background:radial-gradient(circle,rgba(59,130,246,0.15) 0%,transparent 70%); }
.g2 { position:absolute; width:400px; height:400px; border-radius:50%; bottom:-100px; right:-100px;
  background:radial-gradient(circle,rgba(6,182,212,0.1) 0%,transparent 70%); }
.wrap { text-align:center; color:white; padding:60px; position:relative; z-index:1; }
.site { font-size:24px; font-weight:900; color:#60a5fa; margin-bottom:16px; letter-spacing:0.1em; }
.cat { display:inline-block; background:linear-gradient(90deg,#3b82f6,#06b6d4); color:white;
  font-size:17px; font-weight:bold; padding:7px 22px; border-radius:999px; margin-bottom:28px; }
.title { font-size:46px; font-weight:900; line-height:1.3; margin-bottom:24px; color:#fff; }
.accent { color:#60a5fa; }
.sub { font-size:20px; color:#94a3b8; line-height:1.6; }
.tags { display:flex; gap:10px; justify-content:center; margin-top:28px; flex-wrap:wrap; }
.tag { background:rgba(59,130,246,0.2); border:1px solid rgba(59,130,246,0.4);
  color:#93c5fd; padding:5px 14px; border-radius:6px; font-size:15px; }
</style></head>
<body><div class="g1"></div><div class="g2"></div>
<div class="wrap">
  <div class="site">AI navi</div>
  <div class="cat">AIメール作成ツール比較</div>
  <div class="title"><span class="accent">AIメール作成ツール</span><br>おすすめ比較8選</div>
  <div class="sub">メール文面を自動生成するAIツールを徹底比較</div>
  <div class="tags"><span class="tag">8ツール比較</span><span class="tag">日本語対応</span><span class="tag">無料あり</span></div>
</div></body></html>
