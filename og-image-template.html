<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
  }
  .glow-left { top: -100px; left: -100px; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%); }
  .glow-right { bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%); }
  .container {
    text-align: center;
    color: white;
    padding: 60px;
    position: relative;
    z-index: 1;
  }
  .logo {
    font-size: 28px;
    font-weight: 900;
    color: #60a5fa;
    margin-bottom: 20px;
    letter-spacing: 0.1em;
  }
  .badge {
    display: inline-block;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    color: white;
    font-size: 18px;
    font-weight: bold;
    padding: 8px 24px;
    border-radius: 999px;
    margin-bottom: 32px;
    letter-spacing: 0.05em;
  }
  .title {
    font-size: 52px;
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 28px;
    color: #ffffff;
  }
  .title span {
    color: #60a5fa;
  }
  .subtitle {
    font-size: 22px;
    color: #94a3b8;
    line-height: 1.6;
  }
  .tags {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 32px;
  }
  .tag {
    background: rgba(59,130,246,0.2);
    border: 1px solid rgba(59,130,246,0.4);
    color: #93c5fd;
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 16px;
  }
</style>
</head>
<body>
  <div class="glow glow-left"></div>
  <div class="glow glow-right"></div>
  <div class="container">
    <div class="logo">AI navi</div>
    <div class="badge">2026年最新版</div>
    <div class="title"><span>AIツール</span>比較・レビュー<br>徹底ガイド</div>
    <div class="subtitle">ChatGPT・Claude・Geminiなど人気AIツールを<br>実際に使って徹底比較</div>
    <div class="tags">
      <span class="tag">全ツール実使用</span>
      <span class="tag">料金比較</span>
      <span class="tag">初心者向け解説</span>
    </div>
  </div>
</body>
</html>
